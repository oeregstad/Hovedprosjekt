<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="flaggle-css.css">

</head>

<body>
    <nav>
        <ul>

        </ul>
    </nav>

    <h1>Flaggle</h1>


    <div class="container">

        <div class="flagg-container">
            <div class="boks-container">
                <div class="boks 1 ">1</div>
                <div class="boks 2 ">2</div>
                <div class="boks 3 ">3</div>
                <div class="boks 4 ">4</div>
                <div class="boks 5 ">5</div>
                <div class="boks 6 ">6</div>
                <div class="boks 7 ">7</div>
                <div class="boks 8 ">8</div>
                <div class="boks 9 ">9</div>
            </div>
        </div>
    </div>

    <div class="container g">
        <div class="guess-container">
            <div class="input-container">
                <input type="text" autocomplete="off">
                <button class="gjett">gjett</button>
            </div>
            <div class="input-container">
                <input type="text" autocomplete="off" disabled>
                <button class="gjett" disabled>gjett</button>
            </div>
            <div class="input-container">
                <input type="text" autocomplete="off" disabled>
                <button class="gjett" disabled>gjett</button>
            </div>
            <div class="input-container">
                <input type="text" autocomplete="off" disabled>
                <button class="gjett" disabled>gjett</button>
            </div>
            <div class="input-container">
                <input type="text" autocomplete="off" disabled>
                <button class="gjett" disabled>gjett</button>
            </div>

        </div>
    </div>

    <script>

        const boksEls = document.querySelectorAll(".boks")

        const btnEls = document.querySelectorAll(".gjett")

        const inputEls = document.querySelectorAll("input")
        const boksContainerEl = document.querySelector(".boks-container")

        const rekkefølge = [8, 0, 5, 2, 1, 3, 7, 6, 4]
        let gjetningNr = 0

        const land = ["Norge", "Sverige", "Danmark", "Finland", "Tyskland", "Nederland", "Russland"]


        const tilfeldig = Math.floor(Math.random() * land.length)
        const svar = land[tilfeldig]
        console.log(svar)

        const landURL = ["https://flagcdn.com/w320/no.png",
            "https://flagcdn.com/w320/se.png",
            "https://flagcdn.com/w320/dk.png",
            "https://flagcdn.com/w320/fi.png",
            "https://flagcdn.com/w320/de.png",
            "https://flagcdn.com/w320/nl.png",
            "https://flagcdn.com/w320/ru.png",

            ]
        boksContainerEl.style.backgroundImage = "url(" + landURL[tilfeldig] + ")"

        function avslørBoks() {

            inputEls[gjetningNr].focus()
            const avslør = boksEls[rekkefølge[gjetningNr]]
            avslør.style.opacity = 0
            gjetningNr++
            if (gjetningNr < inputEls.length) {
                inputEls[gjetningNr - 1].disabled = true
                inputEls[gjetningNr].disabled = false
                btnEls[gjetningNr].disabled = false
                inputEls[gjetningNr].focus()

            }



        }

        btnEls.forEach(btn => btn.addEventListener("click", () => {

            const gjetning = inputEls[gjetningNr].value

            if (gjetning.toLowerCase() != svar.toLowerCase()) {
                avslørBoks()
                return
            }

            if (gjetning.toLowerCase() == svar.toLowerCase()) {
                boksEls.forEach(boks => boks.style.display = "none")
            }

            inputEls[gjetningNr].value = ""


        }))

        inputEls.forEach(input => input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const gjetning = inputEls[gjetningNr].value

                if (gjetning.toLowerCase() != svar.toLowerCase()) {
                    avslørBoks()
                    return
                }

                if (gjetning.toLowerCase() == svar.toLowerCase()) {
                    boksEls.forEach(boks => boks.style.display = "none")
                }
            }
        }))



    </script>
</body>

</html>
